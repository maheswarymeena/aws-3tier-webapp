<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PurpleConnect 💜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="bg-flower f1">🌸</div>
<div class="bg-flower f2">🌷</div>
<div class="bg-flower f3">💮</div>
<div class="bg-flower f4">🌸</div>
<div class="bg-flower f5">🌼</div>

<!-- ================= AUTH SCREEN ================= -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div class="logo-wrap">
      <span class="logo-emoji">💜</span>
      <h1 class="logo">PurpleConnect</h1>
      <p class="tagline">connect • share • vibe ✨</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Login</button>
      <button class="tab-btn" data-tab="register">Register</button>
    </div>

    <form id="loginForm" class="auth-form">
      <input type="text" id="loginUsername" placeholder="Username" autocomplete="username" required>
      <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" required>
      <button type="submit" class="btn-primary">Login 💫</button>
      <p class="msg" id="loginMsg"></p>
    </form>

    <form id="registerForm" class="auth-form hidden">
      <input type="text" id="regUsername" placeholder="Choose a username" required>
      <input type="password" id="regPassword" placeholder="Choose a password" required>
      <button type="submit" class="btn-primary">Create Account 🎀</button>
      <p class="msg" id="regMsg"></p>
    </form>
  </div>
</div>

<!-- ================= APP SCREEN ================= -->
<div id="appScreen" class="app-screen hidden">
  <nav class="navbar">
    <h2 class="nav-logo">💜 PurpleConnect</h2>
    <div class="nav-right">
      <span id="welcomeUser" class="welcome-text"></span>
      <button id="logoutBtn" class="btn-outline">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="composer card">
      <div class="composer-header">
        <div class="avatar" id="myAvatar">?</div>
        <textarea id="postContent" placeholder="What's on your mind? ✨" rows="2"></textarea>
      </div>

      <div id="mediaPreviewWrap" class="media-preview-wrap hidden">
        <img id="mediaPreviewImg" class="media-preview hidden">
        <video id="mediaPreviewVideo" class="media-preview hidden" controls></video>
        <button id="removeMediaBtn" type="button" class="remove-media-btn">&times;</button>
      </div>

      <div class="composer-footer">
        <div class="composer-left">
          <label for="mediaInput" class="media-upload-btn" title="Add photo or video">📷</label>
          <input type="file" id="mediaInput" accept="image/*,video/*" hidden>
          <span class="hint">Share something cute with everyone 🌸</span>
        </div>
        <button id="postBtn" class="btn-primary small">Post</button>
      </div>
    </div>

    <div id="feed" class="feed">
      <p class="loading-text">Loading posts... 💭</p>
    </div>
  </div>
</div>

<!-- ================= MODAL (likes / comments list) ================= -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <span id="modalClose" class="modal-close">&times;</span>
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="script.js"></script>
</body>
</html>
